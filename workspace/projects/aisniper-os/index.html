<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISniper OS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/dock.css">
    <link rel="stylesheet" href="css/window.css">
    <link rel="stylesheet" href="css/apps.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/context-menu.css">
    <link rel="stylesheet" href="css/launchpad.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/spotlight.css">
</head>
<body>
    <!-- 开机启动动画 -->
    <div id="boot-screen" class="boot-screen">
        <div class="boot-logo">
            <svg viewBox="0 0 100 100" width="120" height="120">
                <defs>
                    <linearGradient id="bootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#5AC8FA"/>
                        <stop offset="50%" stop-color="#007AFF"/>
                        <stop offset="100%" stop-color="#5856D6"/>
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="40" fill="none" stroke="url(#bootGrad)" stroke-width="3" opacity="0.3"/>
                <circle cx="50" cy="50" r="30" fill="none" stroke="url(#bootGrad)" stroke-width="3" opacity="0.6"/>
                <circle cx="50" cy="50" r="20" fill="url(#bootGrad)"/>
                <circle cx="50" cy="50" r="8" fill="white"/>
            </svg>
        </div>
        <div class="boot-progress"><div class="boot-progress-bar"></div></div>
        <div class="boot-text">AISniper OS</div>
    </div>

    <!-- 锁屏 -->
    <div id="lock-screen" class="lock-screen hidden">
        <div class="lock-time" id="lock-time">--:--</div>
        <div class="lock-date" id="lock-date">--</div>
        <div class="lock-user">
            <div class="lock-avatar">A</div>
            <div class="lock-username">Admin</div>
        </div>
        <input type="password" id="lock-password" class="lock-input" placeholder="点击输入密码 (留空直接进入)">
    </div>

    <!-- 桌面 -->
    <div id="desktop" class="desktop hidden">
        <!-- 动态壁纸层 -->
        <div class="wallpaper" id="wallpaper"></div>
        <div class="wallpaper-overlay"></div>

        <!-- 顶部菜单栏 -->
        <div class="menubar">
            <div class="menubar-left">
                <span class="menu-apple">●</span>
                <span class="menu-appname" id="active-app-name">Finder</span>
                <span class="menu-item" data-menu="file">文件</span>
                <span class="menu-item" data-menu="edit">编辑</span>
                <span class="menu-item" data-menu="view">显示</span>
                <span class="menu-item" data-menu="go">前往</span>
                <span class="menu-item" data-menu="window">窗口</span>
                <span class="menu-item" data-menu="help">帮助</span>
            </div>
            <div class="menubar-right">
                <span class="status-icon" id="status-battery" title="电池">🔋 87%</span>
                <span class="status-icon" id="status-wifi" title="Wi-Fi">📶 AISniper-5G</span>
                <span class="status-icon" id="status-bluetooth" title="蓝牙">ⓑ 开</span>
                <span class="status-icon" id="status-search" title="搜索">🔍</span>
                <span class="status-icon" id="status-control" title="控制中心">⚙</span>
                <span class="status-clock" id="status-clock">--月--日 周-- --:--</span>
            </div>
        </div>

        <!-- 桌面图标 -->
        <div class="desktop-icons">
            <div class="desktop-icon" data-app="finder">
                <div class="desktop-icon-img" style="background:linear-gradient(135deg,#5AC8FA,#007AFF);">📁</div>
                <div class="desktop-icon-label">我的文稿</div>
            </div>
            <div class="desktop-icon" data-app="terminal">
                <div class="desktop-icon-img" style="background:linear-gradient(135deg,#1a1a1a,#444);">⌨</div>
                <div class="desktop-icon-label">终端</div>
            </div>
            <div class="desktop-icon" data-app="spaceshooter">
                <div class="desktop-icon-img" style="background:linear-gradient(135deg,#FF3B30,#AF52DE);">🚀</div>
                <div class="desktop-icon-label">太空射击</div>
            </div>
            <div class="desktop-icon" data-app="settings">
                <div class="desktop-icon-img" style="background:linear-gradient(135deg,#8E8E93,#48484A);">⚙</div>
                <div class="desktop-icon-label">系统设置</div>
            </div>
            <div class="desktop-icon" data-app="calculator">
                <div class="desktop-icon-img" style="background:linear-gradient(135deg,#FF9500,#FFCC00);">🧮</div>
                <div class="desktop-icon-label">计算器</div>
            </div>
        </div>

        <!-- 窗口容器 -->
        <div class="windows-container" id="windows-container"></div>

        <!-- 底部 Dock 栏 -->
        <div class="dock-container">
            <div class="dock" id="dock">
                <div class="dock-item" data-app="finder" title="访达">
                    <div class="dock-icon" style="background:linear-gradient(135deg,#5AC8FA,#007AFF);">📁</div>
                </div>
                <div class="dock-item" data-app="calculator" title="计算器">
                    <div class="dock-icon" style="background:linear-gradient(135deg,#FF9500,#FFCC00);">🧮</div>
                </div>
                <div class="dock-item" data-app="settings" title="系统设置">
                    <div class="dock-icon" style="background:linear-gradient(135deg,#8E8E93,#48484A);">⚙</div>
                </div>
                <div class="dock-item" data-app="terminal" title="终端">
                    <div class="dock-icon" style="background:linear-gradient(135deg,#1a1a1a,#444);">⌨</div>
                </div>
                <div class="dock-separator"></div>
                <div class="dock-item" data-app="spaceshooter" title="太空射击">
                    <div class="dock-icon" style="background:linear-gradient(135deg,#FF3B30,#AF52DE);">🚀</div>
                </div>
                <div class="dock-item" id="launchpad-trigger" title="启动台">
                    <div class="dock-icon" style="background:linear-gradient(135deg,#34C759,#30B0C7);">⊞</div>
                </div>
            </div>
        </div>

        <!-- 控制中心弹窗 -->
        <div class="control-center hidden" id="control-center">
            <div class="cc-grid">
                <div class="cc-tile cc-large" id="cc-wifi">
                    <div class="cc-icon">📶</div>
                    <div class="cc-label">Wi-Fi</div>
                    <div class="cc-value" id="cc-wifi-name">AISniper-5G</div>
                </div>
                <div class="cc-tile cc-large" id="cc-bluetooth">
                    <div class="cc-icon">ⓑ</div>
                    <div class="cc-label">蓝牙</div>
                    <div class="cc-value">已开启</div>
                </div>
                <div class="cc-tile cc-large" id="cc-airdrop">
                    <div class="cc-icon">📡</div>
                    <div class="cc-label">隔空投送</div>
                    <div class="cc-value">仅限联系人</div>
                </div>
                <div class="cc-tile" id="cc-theme">
                    <div class="cc-icon">🌙</div>
                    <div class="cc-label">深色模式</div>
                </div>
                <div class="cc-tile" id="cc-dnd">
                    <div class="cc-icon">🌙</div>
                    <div class="cc-label">勿扰</div>
                </div>
                <div class="cc-tile" id="cc-theater">
                    <div class="cc-icon">🎬</div>
                    <div class="cc-label">影院</div>
                </div>
            </div>
            <div class="cc-section">
                <div class="cc-section-title">显示器亮度</div>
                <input type="range" min="20" max="100" value="80" class="cc-slider" id="cc-brightness">
            </div>
            <div class="cc-section">
                <div class="cc-section-title">声音</div>
                <input type="range" min="0" max="100" value="60" class="cc-slider" id="cc-volume">
            </div>
            <div class="cc-health" id="cc-health">
                <div class="cc-health-title">系统健康度</div>
                <div class="cc-health-row">
                    <span>CPU</span>
                    <div class="health-bar"><div class="health-fill" id="health-cpu" style="width:35%"></div></div>
                    <span id="health-cpu-val">35%</span>
                </div>
                <div class="cc-health-row">
                    <span>内存</span>
                    <div class="health-bar"><div class="health-fill" id="health-mem" style="width:52%"></div></div>
                    <span id="health-mem-val">52%</span>
                </div>
                <div class="cc-health-row">
                    <span>磁盘</span>
                    <div class="health-bar"><div class="health-fill" id="health-disk" style="width:28%"></div></div>
                    <span id="health-disk-val">28%</span>
                </div>
                <div class="cc-health-row">
                    <span>网络</span>
                    <div class="health-bar"><div class="health-fill" id="health-net" style="width:15%"></div></div>
                    <span id="health-net-val">↑2.1MB</span>
                </div>
            </div>
            <div class="cc-battery">
                <div class="cc-battery-icon">🔋</div>
                <div>
                    <div class="cc-battery-pct">87%</div>
                    <div class="cc-battery-status">电量充足</div>
                </div>
            </div>
        </div>

        <!-- 通知中心 -->
        <div class="notification-center hidden" id="notification-center">
            <div class="nc-header">通知</div>
            <div class="nc-empty">没有新通知</div>
        </div>

        <!-- Spotlight 搜索 -->
        <div class="spotlight hidden" id="spotlight">
            <div class="spotlight-box">
                <div class="spotlight-input-wrap">
                    <span class="spotlight-icon">🔍</span>
                    <input type="text" id="spotlight-input" placeholder="Spotlight 搜索" autocomplete="off">
                </div>
                <div class="spotlight-results" id="spotlight-results"></div>
            </div>
        </div>

        <!-- 启动台 -->
        <div class="launchpad hidden" id="launchpad">
            <div class="launchpad-search">
                <input type="text" id="launchpad-input" placeholder="搜索">
            </div>
            <div class="launchpad-grid" id="launchpad-grid"></div>
        </div>

        <!-- 右键菜单 -->
        <div class="context-menu hidden" id="context-menu"></div>

        <!-- 通知 Toast -->
        <div class="notification-stack" id="notification-stack"></div>

        <!-- Dock 放大提示 -->
        <div class="dock-tooltip hidden" id="dock-tooltip"></div>
    </div>

    <!-- 引入 Three.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <!-- 业务脚本 -->
    <script src="js/theme.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/windowManager.js"></script>
    <script src="js/apps/finder.js"></script>
    <script src="js/apps/calculator.js"></script>
    <script src="js/apps/settings.js"></script>
    <script src="js/apps/terminal.js"></script>
    <script src="js/apps/spaceShooter.js"></script>
    <script src="js/controlCenter.js"></script>
    <script src="js/spotlight.js"></script>
    <script src="js/launchpad.js"></script>
    <script src="js/contextMenu.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/menubar.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
