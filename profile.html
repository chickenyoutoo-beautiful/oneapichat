<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>个人设置 · NAUJTRATS</title>
    <link rel="icon" type="image/png" sizes="16x16" href="./src/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./src/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="256x256" href="./src/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] } }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0,0,0,0.05);
        }
        .dark .glass-card {
            background: rgba(31, 41, 55, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.05);
        }
        .brand-glow {
            text-shadow: 0 0 40px rgba(37, 99, 235, 0.3);
        }
        .dark .brand-glow {
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
        }
        .input-field {
            transition: all 0.2s ease;
            border: 1.5px solid #e5e7eb;
        }
        .input-field:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            outline: none;
        }
        .dark .input-field {
            background: #374151;
            border-color: #4b5563;
            color: #f3f4f6;
        }
        .dark .input-field:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
        }
        .dark .input-field::placeholder { color: #9ca3af; }
        .btn-primary {
            background: #2563eb;
            transition: all 0.2s ease;
        }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); }
        .btn-primary:active { transform: translateY(0); box-shadow: none; }
        .btn-primary:disabled { opacity: 0.6; transform: none; cursor: not-allowed; box-shadow: none; }
        .dark .btn-primary { background: #3b82f6; }
        .dark .btn-primary:hover { background: #2563eb; }
        .btn-danger {
            background: #ef4444;
            transition: all 0.2s ease;
        }
        .btn-danger:hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3); }
        .btn-danger:active { transform: translateY(0); }
        .error-msg {
            animation: shake 0.4s ease;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }
        .dark .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .success-msg {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
        }
        .dark .success-msg {
            background: rgba(22, 163, 74, 0.1);
            border-color: rgba(22, 163, 74, 0.3);
            color: #4ade80;
        }
        .section-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .dark .section-card {
            background: #1f2937;
            border-color: #374151;
        }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f3f4f6;
        }
        .dark .section-title {
            color: #f9fafb;
            border-bottom-color: #374151;
        }
        .avatar-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-950 transition-colors">

    <!-- 背景装饰 -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="floating-orb w-96 h-96 bg-blue-400 opacity-15 -top-20 -right-20" style="animation-delay: 0s;"></div>
        <div class="floating-orb w-80 h-80 bg-indigo-400 opacity-12 bottom-10 -left-20" style="animation-delay: 3s;"></div>
    </div>

    <!-- Header -->
    <header class="relative z-10 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="./" class="flex items-center gap-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    <span class="text-sm font-medium">返回聊天</span>
                </a>
            </div>
            <h1 class="brand-glow text-xl font-bold text-gray-900 dark:text-white">个人设置</h1>
            <div class="w-24"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 max-w-2xl mx-auto px-4 py-8 animate-fade-in">
        
        <!-- 用户信息卡片 -->
        <div class="section-card" id="profileCard">
            <div class="flex items-center gap-4 mb-6">
                <div class="avatar-circle" id="avatarInitial">?</div>
                <div>
                    <div class="text-lg font-semibold text-gray-900 dark:text-white" id="displayUsername">加载中...</div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 mt-1" id="displayUserId">-</div>
                </div>
            </div>
            <div class="text-xs text-gray-400 dark:text-gray-500" id="displayCreatedAt"></div>
        </div>

        <!-- 修改用户名 -->
        <div class="section-card">
            <div class="section-title">✏️ 修改用户名</div>
            <form id="usernameForm" onsubmit="return handleUpdateUsername(event)">
                <div class="space-y-1.5 mb-4">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-wide uppercase">新用户名</label>
                    <input type="text" id="newUsername" placeholder="2-20个字符，中英文或数字" autocomplete="off"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400">
                </div>
                <div id="usernameError" class="hidden text-sm px-4 py-3 rounded-xl error-msg mb-4"></div>
                <div id="usernameSuccess" class="hidden text-sm px-4 py-3 rounded-xl success-msg mb-4"></div>
                <button type="submit" id="usernameBtn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm tracking-wide">
                    保存用户名
                </button>
            </form>
        </div>

        <!-- 修改密码 -->
        <div class="section-card">
            <div class="section-title">🔐 修改密码</div>
            <form id="passwordForm" onsubmit="return handleUpdatePassword(event)">
                <div class="space-y-1.5 mb-4">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-wide uppercase">当前密码</label>
                    <input type="password" id="currentPassword" placeholder="输入当前密码" autocomplete="off"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400">
                </div>
                <div class="space-y-1.5 mb-4">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-wide uppercase">新密码</label>
                    <input type="password" id="newPassword" placeholder="至少6位" autocomplete="off"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400">
                </div>
                <div class="space-y-1.5 mb-4">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-wide uppercase">确认新密码</label>
                    <input type="password" id="confirmNewPassword" placeholder="再次输入新密码" autocomplete="off"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400">
                </div>
                <div id="passwordError" class="hidden text-sm px-4 py-3 rounded-xl error-msg mb-4"></div>
                <div id="passwordSuccess" class="hidden text-sm px-4 py-3 rounded-xl success-msg mb-4"></div>
                <button type="submit" id="passwordBtn" class="btn-danger w-full py-3 rounded-xl text-white font-semibold text-sm tracking-wide">
                    修改密码
                </button>
            </form>
        </div>

        <!-- 退出登录 -->
        <div class="section-card text-center">
            <button onclick="handleLogout()" class="text-gray-400 hover:text-red-500 dark:text-gray-500 dark:hover:text-red-400 transition-colors text-sm font-medium">
                🚪 退出登录
            </button>
        </div>
    </main>

    <script>
        const SERVER_API_BASE = 'https://xiaoxin.naujtrats.xyz/oneapichat';

        function getToken() {
            return localStorage.getItem('authToken') || '';
        }

        function getUsername() {
            return localStorage.getItem('authUsername') || '';
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            if (el) { el.textContent = msg; el.classList.remove('hidden'); }
            else console.error('Element not found:', id);
        }

        function showSuccess(id, msg) {
            const el = document.getElementById(id);
            if (el) { el.textContent = msg; el.classList.remove('hidden'); }
        }

        function clearMessages() {
            ['usernameError','usernameSuccess','passwordError','passwordSuccess'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
        }

        function updateAvatarInitial(username) {
            const initial = document.getElementById('avatarInitial');
            if (initial && username) {
                initial.textContent = username.charAt(0).toUpperCase();
            }
        }

        // 初始化
        (async function init() {
            const token = getToken();
            if (!token) {
                alert('未登录，即将跳转到登录页面');
                window.location.href = 'https://xiaoxin.naujtrats.xyz/?from=chat';
                return;
            }

            // 加载用户信息
            try {
                const resp = await fetch(SERVER_API_BASE + '/auth.php?action=get_profile&token=' + encodeURIComponent(token));
                const data = await resp.json();
                if (data.success) {
                    document.getElementById('displayUsername').textContent = data.username;
                    document.getElementById('displayUserId').textContent = 'ID: ' + (localStorage.getItem('authUserId') || '-').substring(0, 16) + '...';
                    if (data.created_at) {
                        document.getElementById('displayCreatedAt').textContent = '注册于：' + data.created_at.substring(0, 10);
                    }
                    updateAvatarInitial(data.username);
                    document.getElementById('newUsername').value = data.username;
                } else {
                    alert('会话已过期，请重新登录');
                    window.location.href = 'https://xiaoxin.naujtrats.xyz/?from=chat';
                }
            } catch(err) {
                console.error('[profile]', err);
                alert('加载失败，请检查网络');
            }
        })();

        // 更新用户名
        async function handleUpdateUsername(e) {
            e.preventDefault();
            clearMessages();

            const token = getToken();
            const newUsername = document.getElementById('newUsername').value.trim();
            const btn = document.getElementById('usernameBtn');

            if (!newUsername || newUsername.length < 2 || newUsername.length > 20) {
                showError('usernameError', '用户名长度需在 2-20 个字符');
                return;
            }

            btn.disabled = true;
            btn.textContent = '保存中...';

            try {
                const resp = await fetch(SERVER_API_BASE + '/auth.php?action=update_profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, username: newUsername })
                });
                const data = await resp.json();
                if (data.success) {
                    localStorage.setItem('authUsername', data.username);
                    document.getElementById('displayUsername').textContent = data.username;
                    updateAvatarInitial(data.username);
                    showSuccess('usernameSuccess', '用户名已更新为：' + data.username);
                } else {
                    showError('usernameError', data.error || '更新失败');
                }
            } catch(err) {
                showError('usernameError', '网络错误，请重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '保存用户名';
            }
        }

        // 更新密码
        async function handleUpdatePassword(e) {
            e.preventDefault();
            clearMessages();

            const token = getToken();
            const currentPw = document.getElementById('currentPassword').value;
            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmNewPassword').value;
            const btn = document.getElementById('passwordBtn');

            if (!currentPw) { showError('passwordError', '请输入当前密码'); return; }
            if (!newPw || newPw.length < 6) { showError('passwordError', '新密码长度至少 6 位'); return; }
            if (newPw !== confirmPw) { showError('passwordError', '两次输入的密码不一致'); return; }

            btn.disabled = true;
            btn.textContent = '修改中...';

            try {
                const resp = await fetch(SERVER_API_BASE + '/auth.php?action=update_profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, current_password: currentPw, new_password: newPw })
                });
                const data = await resp.json();
                if (data.success) {
                    showSuccess('passwordSuccess', '密码修改成功！');
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmNewPassword').value = '';
                } else {
                    showError('passwordError', data.error || '修改失败');
                }
            } catch(err) {
                showError('passwordError', '网络错误，请重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '修改密码';
            }
        }

        // 退出登录
        async function handleLogout() {
            if (!confirm('确定要退出登录吗？')) return;
            try {
                const token = getToken();
                await fetch(SERVER_API_BASE + '/auth.php?action=logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
            } catch(e) {}
            localStorage.removeItem('authToken');
            localStorage.removeItem('authUsername');
            localStorage.removeItem('authUserId');
            window.location.href = './?redirect=chat';
        }
    </script>
</body>
</html>
