<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NAUJTRATS · 登录</title>
    <link rel="icon" type="image/png" sizes="16x16" href="./src/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./src/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="256x256" href="./src/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] } }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0,0,0,0.05);
        }
        .dark .glass-card {
            background: rgba(31, 41, 55, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.05);
        }
        .brand-glow {
            text-shadow: 0 0 40px rgba(37, 99, 235, 0.3);
        }
        .dark .brand-glow {
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
        }
        .input-field {
            transition: all 0.2s ease;
            border: 1.5px solid #e5e7eb;
        }
        .input-field:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            outline: none;
        }
        .dark .input-field {
            background: #374151;
            border-color: #4b5563;
            color: #f3f4f6;
        }
        .dark .input-field:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
        }
        .dark .input-field::placeholder { color: #9ca3af; }
        .btn-primary {
            background: #2563eb;
            transition: all 0.2s ease;
        }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); }
        .btn-primary:active { transform: translateY(0); box-shadow: none; }
        .btn-primary:disabled { opacity: 0.6; transform: none; cursor: not-allowed; box-shadow: none; }
        .dark .btn-primary { background: #3b82f6; }
        .dark .btn-primary:hover { background: #2563eb; }
        .tab-btn {
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .dark .tab-btn.active {
            background: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }
        .animate-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .animate-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .animate-delay-3 { animation-delay: 0.3s; opacity: 0; }
        .animate-delay-4 { animation-delay: 0.4s; opacity: 0; }
        .error-msg {
            animation: shake 0.4s ease;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }
        .dark .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .success-msg {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
        }
        .dark .success-msg {
            background: rgba(22, 163, 74, 0.1);
            border-color: rgba(22, 163, 74, 0.3);
            color: #4ade80;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-950 transition-colors">

    <!-- 背景装饰 -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="floating-orb w-96 h-96 bg-blue-400 opacity-20 -top-20 -right-20" style="animation-delay: 0s;"></div>
        <div class="floating-orb w-80 h-80 bg-indigo-400 opacity-15 bottom-10 -left-20" style="animation-delay: 3s;"></div>
        <div class="floating-orb w-64 h-64 bg-purple-400 opacity-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" style="animation-delay: 5s;"></div>
    </div>

    <div class="relative z-10 w-full max-w-md px-4">
        <!-- Logo / Brand -->
        <div class="text-center mb-8 animate-fade-in">
            <a href="../" class="inline-block">
                <h1 class="brand-glow text-4xl font-bold text-gray-900 dark:text-white tracking-tight">
                    NAUJTRATS
                </h1>
            </a>
            <p class="text-gray-400 dark:text-gray-500 text-sm mt-2 font-medium tracking-wider">AI 助手</p>
        </div>

        <!-- 主卡片 -->
        <div class="glass-card rounded-2xl p-8 animate-fade-in animate-delay-1">

            <!-- Tab 切换 -->
            <div class="flex gap-1 mb-8 bg-gray-100 dark:bg-gray-800 rounded-xl p-1">
                <button id="tabLogin" onclick="switchTab('login')" class="tab-btn flex-1 py-2.5 rounded-lg text-sm font-semibold text-gray-500 dark:text-gray-400 active">
                    登录
                </button>
                <button id="tabRegister" onclick="switchTab('register')" class="tab-btn flex-1 py-2.5 rounded-lg text-sm font-semibold text-gray-500 dark:text-gray-400">
                    注册
                </button>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" onsubmit="return handleAuth(event, 'login')" class="space-y-5" autocomplete="off">
                <input type="text" style="position:absolute;left:-9999px;top:-9999px" autocomplete="nope" name="fake_login_user">
                <input type="password" style="position:absolute;left:-9999px;top:-9999px" autocomplete="new-password" name="fake_login_pass">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-wide uppercase">用户名</label>
                    <input type="text" id="loginUsername" placeholder="输入用户名" autocomplete="nope" name="login_user"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-wide uppercase">密码</label>
                    <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="new-password" name="login_pass" readonly onfocus="this.removeAttribute('readonly')"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400">
                </div>
                <div id="loginError" class="hidden text-sm px-4 py-3 rounded-xl error-msg"></div>
                <div id="loginSuccess" class="hidden text-sm px-4 py-3 rounded-xl success-msg"></div>
                <button type="submit" id="loginBtn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm tracking-wide">
                    登 录
                </button>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" onsubmit="return handleAuth(event, 'register')" class="space-y-5 hidden" autocomplete="off">
                <input type="text" style="position:absolute;left:-9999px;top:-9999px" autocomplete="nope" name="fake_reg_user">
                <input type="password" style="position:absolute;left:-9999px;top:-9999px" autocomplete="new-password" name="fake_reg_pass">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-wide uppercase">用户名</label>
                    <input type="text" id="registerUsername" placeholder="2-20个字符，中英文或数字" autocomplete="nope" name="reg_user"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-wide uppercase">密码</label>
                    <input type="password" id="registerPassword" placeholder="至少6位" autocomplete="new-password" name="reg_pass" readonly onfocus="this.removeAttribute('readonly')"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-wide uppercase">确认密码</label>
                    <input type="password" id="registerConfirm" placeholder="再次输入密码" autocomplete="nope" name="reg_confirm"
                        class="input-field w-full px-4 py-3 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400">
                </div>
                <div id="registerError" class="hidden text-sm px-4 py-3 rounded-xl error-msg"></div>
                <div id="registerSuccess" class="hidden text-sm px-4 py-3 rounded-xl success-msg"></div>
                <button type="submit" id="registerBtn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm tracking-wide">
                    注 册
                </button>
            </form>
        </div>

        <!-- 底部返回 -->
        <div class="text-center mt-6 animate-fade-in animate-delay-2">
            <a href="../" class="text-sm text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors">
                ← 返回主页
            </a>
            <span class="text-gray-300 dark:text-gray-600 mx-2">|</span>
            <button onclick="toggleDark()" class="text-sm text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors">
                <span id="themeLabel">深色模式</span>
            </button>
            <span class="text-gray-300 dark:text-gray-600 mx-2">|</span>
            <button onclick="clearAndReload()" class="text-sm text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors">
                切换账号
            </button>
        </div>
    </div>

    <script>
        const SERVER_API_BASE = 'https://xiaoxin.naujtrats.xyz/oneapichat';

        // ---- 智能跳转：来自哪个站点就跳回哪个 ----
        function getRedirectUrl() {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            if (redirect === 'main') return '../';
            if (redirect === 'chat') return './';
            // 默认：检测 referrer
            const referrer = document.referrer;
            if (referrer.includes('/oneapichat/')) return './';
            return '../';
        }

        // Tab 切换
        function switchTab(tab) {
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            clearMessages();
        }

        function clearMessages() {
            ['loginError','loginSuccess','registerError','registerSuccess'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
        }

        function showError(form, msg) {
            const el = document.getElementById(form + 'Error');
            if (el) { el.textContent = msg; el.classList.remove('hidden'); }
        }

        function showSuccess(form, msg) {
            const el = document.getElementById(form + 'Success');
            if (el) { el.textContent = msg; el.classList.remove('hidden'); }
        }

        async function handleAuth(e, type) {
            e.preventDefault();
            clearMessages();

            const btn = document.getElementById(type + 'Btn');
            const original = btn.textContent.trim();
            btn.disabled = true;
            btn.textContent = type === 'login' ? '登录中...' : '注册中...';

            try {
                if (type === 'login') {
                    const username = document.getElementById('loginUsername').value.trim();
                    const password = document.getElementById('loginPassword').value;
                    if (!username || !password) { showError('login', '请填写用户名和密码'); btn.disabled = false; btn.textContent = original; return; }

                    const resp = await fetch(SERVER_API_BASE + '/auth.php?action=login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await resp.json();
                    if (data.success && data.token) {
                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('authUsername', data.username);
                        localStorage.setItem('authUserId', data.user_id);
                        showSuccess('login', '登录成功！正在跳转...');
                        const dest = getRedirectUrl();
                        setTimeout(() => { window.location.replace(dest); }, 300);
                    } else {
                        showError('login', data.error || '登录失败，请检查用户名和密码');
                    }
                } else {
                    const username = document.getElementById('registerUsername').value.trim();
                    const password = document.getElementById('registerPassword').value;
                    const confirm = document.getElementById('registerConfirm').value;
                    if (!username || !password) { showError('register', '请填写用户名和密码'); btn.disabled = false; btn.textContent = original; return; }
                    if (password !== confirm) { showError('register', '两次密码不一致'); btn.disabled = false; btn.textContent = original; return; }
                    if (username.length < 2) { showError('register', '用户名长度需在 2-20 个字符'); btn.disabled = false; btn.textContent = original; return; }
                    if (password.length < 6) { showError('register', '密码长度至少 6 位'); btn.disabled = false; btn.textContent = original; return; }

                    const resp = await fetch(SERVER_API_BASE + '/auth.php?action=register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await resp.json();
                    if (data.success && data.token) {
                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('authUsername', data.username);
                        localStorage.setItem('authUserId', data.user_id);
                        showSuccess('register', '注册成功！正在跳转...');
                        const dest = getRedirectUrl();
                        setTimeout(() => { window.location.replace(dest); }, 300);
                    } else {
                        showError('register', data.error || '注册失败，请稍后重试');
                    }
                }
            } catch(err) {
                console.error('[auth]', err);
                showError(type, '网络错误，请检查网络后重试');
            } finally {
                btn.disabled = false;
                btn.textContent = original;
            }
        }

        // 暗色模式切换
        function toggleDark() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('dark', isDark ? '1' : '0');
            document.getElementById('themeLabel').textContent = isDark ? '浅色模式' : '深色模式';
        }

        // 初始化
        (function() {
            const dark = localStorage.getItem('dark');
            if (dark === '1') {
                document.documentElement.classList.add('dark');
                document.getElementById('themeLabel').textContent = '浅色模式';
            }
            // 如果已登录，直接跳转
            const token = localStorage.getItem('authToken');
            if (token) {
                fetch(SERVER_API_BASE + '/auth.php?action=verify&token=' + token)
                    .then(r => r.json())
                    .then(data => {
                        if (data.valid) {
                            const dest = getRedirectUrl();
                            window.location.replace(dest);
                        }
                    })
                    .catch(() => {});
            }
        })();

        // 切换账号：清掉旧状态，允许登录新账号
        const CLOUD_CONFIG_KEYS = [
            'apiKey','baseUrl','model','systemPrompt',
            'visionModel','visionApiUrl','visionApiKey',
            'imageModel','imageApiKey','imageBaseUrl',
            'temp','tokens','stream',
            'reasoningDelay','contentDelay','requestTimeout',
            'customParams','customEnabled',
            'lineHeight','paragraphMargin','paragraphPrefix',
            'markdownGFM','markdownBreaks',
            'titleModel',
            'enableSearch','searchModel','searchProvider',
            'searchApiKey','searchApiKeyBrave','searchApiKeyGoogle','searchApiKeyTavily',
            'searchRegion','searchTimeout','maxSearchResults',
            'aiSearchJudge','aiSearchJudgeModel','aiSearchJudgePrompt',
            'enableSearchOptimize','fontSize',
            'searchType','aiSearchTypeToggle','searchShowPrompt','searchAppendToSystem',
            'searchToolCall'
        ];
        function clearAndReload() {
            if (!confirm('切换账号会清空本地所有数据，确定继续？')) return;
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
