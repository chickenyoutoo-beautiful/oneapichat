<!DOCTYPE html>
<html>
<head>
    <title>Chart Test</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
    <canvas id="myChart" width="400" height="200"></canvas>
    <script>
        const ctx = document.getElementById('myChart');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['2025', '2026', '2027', '2028', '2029'],
                datasets: [{
                    label: '预测',
                    data: [320, 450, 580, 710, 850],
                    borderColor: '#3b82f6',
                    tension: 0.3
                }, {
                    label: '乐观预测',
                    data: [280, 390, 520, 640, 760],
                    borderColor: '#22c55e',
                    tension: 0.3
                }]
            },
            options: {
                plugins: {
                    title: { display: true, text: '未来5年销售额预测' }
                },
                scales: {
                    y: { title: { display: true, text: '销售额(万元)' }, min: 0, max: 900 }
                }
            }
        });
    </script>
    <p>Chart.js test - if you see a chart above, the library works</p>
</body>
</html>
