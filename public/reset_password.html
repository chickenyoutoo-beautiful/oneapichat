<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>重置密码 · NAUJTRATS</title>
<style>
:root {
    --bg: #0b1120; --bg2: linear-gradient(135deg,#0b1120 0%,#1a1f35 30%,#2d2a5a 70%,#1e1a40 100%);
    --card: rgba(255,255,255,0.03); --text: #f1f5f9; --dim: #94a3b8;
    --accent: #38bdf8; --warn: #f87171; --border: rgba(255,255,255,0.08);
    --input: rgba(255,255,255,0.05); --green: #4ade80;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    background:var(--bg2); background-attachment:fixed;
    color:var(--text); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:20px;
}
.card{
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:36px 40px; width:100%; max-width:420px; backdrop-filter:blur(20px);
}
.logo{
    text-align:center; font-weight:bold; font-size:1.3rem; letter-spacing:2px;
    background:linear-gradient(90deg,var(--accent),#818cf8);
    -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:24px;
}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;color:var(--dim);margin-bottom:6px}
.field input{
    width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;
    background:var(--input);color:var(--text);font-size:14px;outline:none;
}
.field input:focus{border-color:var(--accent)}
.btn{
    width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;
    cursor:pointer;background:var(--accent);color:#0b1120;
}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.msg{
    padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;
}
.msg-error{display:block;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:var(--warn)}
.msg-success{display:block;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:var(--green)}
</style>
</head>
<body>
<div class="card">
    <div class="logo">NAUJTRATS</div>
    <div class="msg" id="msg"></div>
    <div class="field"><label>新密码</label><input type="password" id="pwd" placeholder="至少6位"></div>
    <div class="field"><label>确认密码</label><input type="password" id="pwd2" placeholder="再次输入"></div>
    <button class="btn" id="btn" onclick="doReset()">重置密码</button>
</div>
<script>
var token = new URLSearchParams(location.search).get('token');
if (!token) {
    document.getElementById('msg').className = 'msg msg-error';
    document.getElementById('msg').textContent = '无效的重置链接';
    document.getElementById('btn').style.display = 'none';
}
function doReset() {
    var pwd = document.getElementById('pwd').value;
    var pwd2 = document.getElementById('pwd2').value;
    if (!pwd || pwd.length < 6) { showMsg('密码至少6位', true); return; }
    if (pwd !== pwd2) { showMsg('两次密码不一致', true); return; }
    var btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = '提交中...';
    fetch('/oneapichat/api/auth.php?action=reset_password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, password: pwd })
    }).then(function(r){ return r.json(); }).then(function(d){
        if (d.success) {
            showMsg('密码已重置！即将返回登录页...', false);
            setTimeout(function(){ location.href = '/'; }, 2000);
        } else {
            showMsg(d.error || '重置失败', true);
            btn.disabled = false; btn.textContent = '重置密码';
        }
    }).catch(function(){
        showMsg('网络错误', true);
        btn.disabled = false; btn.textContent = '重置密码';
    });
}
function showMsg(msg, err) {
    var el = document.getElementById('msg');
    el.textContent = msg;
    el.className = 'msg ' + (err ? 'msg-error' : 'msg-success');
}
</script>
</body>
</html>
