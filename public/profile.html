<!DOCTYPE html>
<html lang="zh-CN" class="profile-page">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>个人中心 · NAUJTRATS</title>
<style>
:root {
    --bg: #0b1120; --bg2: linear-gradient(135deg,#0b1120 0%,#1a1f35 30%,#2d2a5a 70%,#1e1a40 100%);
    --card: rgba(255,255,255,0.03); --text: #f1f5f9; --dim: #94a3b8;
    --accent: #38bdf8; --warn: #f87171; --border: rgba(255,255,255,0.08);
    --input: rgba(255,255,255,0.05); --purple: #818cf8; --green: #4ade80;
    --menu-bg: #1a1f35;
}
body.light-mode, html.light .profile-page body, .profile-page.light body {
    --bg: #f0f4ff; --bg2: linear-gradient(135deg,#e6f0ff 0%,#a8c6ff 20%,#d4e4ff 60%,#f0e0ff 100%);
    --card: rgba(255,255,255,0.82); --text: #1e293b; --dim: #475569;
    --border: rgba(0,0,0,0.08); --input: rgba(0,0,0,0.04);
    --menu-bg: rgba(255,255,255,0.9);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    background:var(--bg2); background-attachment:fixed;
    color:var(--text); min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:40px 20px;
    transition:background 0.3s,color 0.3s;
}
.container{width:100%;max-width:520px}
.topbar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:520px;margin-bottom:40px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--dim);text-decoration:none;font-size:14px;transition:color 0.2s;padding:8px 0}
.back-btn:hover{color:var(--text)}
.back-btn svg{width:18px;height:18px;stroke:currentColor}
.logo{font-weight:bold;font-size:1.2rem;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent}
.avatar-section{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;margin-bottom:14px;box-shadow:0 8px 30px rgba(56,189,248,0.25)}
.role-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(129,140,248,0.15);color:var(--purple);letter-spacing:0.5px;margin-top:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;margin-bottom:20px;backdrop-filter:blur(20px);transition:background 0.3s,border-color 0.3s}
.card-title{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.card-title::before{content:"";width:3px;height:14px;background:var(--accent);border-radius:3px;box-shadow:0 0 10px var(--accent)}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;color:var(--dim);margin-bottom:6px}
.field input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;background:var(--input);color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s,background 0.3s}
.field input:focus{border-color:var(--accent)}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:#0b1120}
.btn-primary:hover{box-shadow:0 8px 25px rgba(56,189,248,0.35);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-danger{background:rgba(248,113,113,0.15);color:var(--warn);border:1px solid rgba(248,113,113,0.3)}
.btn-danger:hover{background:rgba(248,113,113,0.25)}
.msg{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.msg-error{display:block;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:var(--warn)}
.msg-success{display:block;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:var(--green)}
.info-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
.info-row:last-child{border-bottom:none}
.info-row .label{color:var(--dim)}
.spinner{width:20px;height:20px;border:2px solid rgba(0,0,0,0.2);border-top-color:currentColor;border-radius:50%;animation:spin 0.6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
    <a class="back-btn" id="backBtn" href="#" onclick="goBack(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        <span id="backLabel">返回</span>
    </a>
    <span class="logo">NAUJTRATS</span>
</div>

<div class="container">
    <div class="card">
        <div class="card-title">账号信息</div>
        <div class="avatar-section">
            <div class="avatar" id="avatarLetter"></div>
            <div style="font-size:18px;font-weight:600" id="profileUsername"></div>
            <div class="role-badge" id="profileRole"></div>
        </div>
        <div id="profileInfo"></div>
    </div>

    <!-- 修改用户名 -->
    <div class="card">
        <div class="card-title">修改用户名</div>
        <div class="msg" id="nameMsg"></div>
        <div class="field"><label>新用户名</label><input type="text" id="newUsername" placeholder="2-20字符"></div>
        <button class="btn btn-primary" id="nameBtn" onclick="changeUsername()">更新用户名</button>
    </div>

    <!-- 邮箱绑定 -->
    <div class="card">
        <div class="card-title">邮箱绑定</div>
        <div class="msg" id="emailMsg"></div>
        <div id="emailUnbound">
            <div class="info-row"><span class="label">当前绑定</span><span id="currentEmail" style="color:var(--warn)">未绑定</span></div>
            <div class="field" style="margin-top:14px"><label>邮箱地址</label><input type="email" id="bindEmail" placeholder="your@email.com" autocomplete="email"></div>
            <div style="display:flex;gap:10px">
                <button class="btn btn-primary" id="sendCodeBtn" onclick="sendVerifyCode()" style="flex:1">发送验证码</button>
                <div class="field" style="flex:2;margin:0"><input type="text" id="verifyCode" placeholder="6位验证码" maxlength="6" style="margin:0"></div>
            </div>
            <button class="btn btn-primary" id="bindBtn" onclick="bindEmail()" style="margin-top:12px">验证并绑定</button>
        </div>
        <div id="emailBound" style="display:none;">
            <div class="info-row"><span class="label">已绑定邮箱</span><span id="boundEmail" style="color:var(--green);font-weight:500;"></span></div>
            <button class="btn btn-danger" onclick="unbindEmail()" style="margin-top:14px">解除绑定</button>
        </div>
    </div>

    <!-- 修改密码 -->
    <div class="card">
        <div class="card-title">安全设置</div>
        <div class="msg" id="pwdMsg"></div>
        <div class="field"><label>当前密码</label><input type="password" id="currentPwd" placeholder="输入当前密码" autocomplete="current-password"></div>
        <div class="field"><label>新密码</label><input type="password" id="newPwd" placeholder="至少6位" autocomplete="new-password"></div>
        <div class="field"><label>确认新密码</label><input type="password" id="newPwd2" placeholder="再次输入新密码"></div>
        <button class="btn btn-primary" id="pwdBtn" onclick="changePassword()">更新密码</button>
    </div>

    <button class="btn btn-danger" onclick="logout()" style="margin-top:8px">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        退出登录
    </button>
    <button class="btn btn-danger" onclick="deleteAccount()" style="margin-top:8px;background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.15);">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        注销账号
    </button>
</div>

<script>
(function initTheme() {
    // 跟随源页面主题
    var t = localStorage.getItem('theme') || 'dark';
    if (t === 'light') document.body.classList.add('light-mode');
    // oneapichat 主题
    var d = localStorage.getItem('dark');
    if (d === 'false') document.body.classList.add('light-mode');

    // 返回按钮：智能判断来源
    var back = document.getElementById('backBtn');
    var label = document.getElementById('backLabel');
    var ref = document.referrer;
    if (ref.indexOf('/oneapichat') !== -1) {
        back.href = '/oneapichat/';
        label.textContent = '返回 OneAPIChat';
    } else {
        back.href = '/';
        label.textContent = '返回主页';
    }
})();

function goBack(e) {
    e.preventDefault();
    var ref = document.referrer;
    if (ref) { location.href = ref; return; }
    if (location.pathname.indexOf('/oneapichat') !== -1) { location.href = '/oneapichat/'; }
    else { location.href = '/'; }
}

function $msg(id, text, isErr) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + (isErr ? 'msg-error' : 'msg-success');
    el.style.display = 'block';
    setTimeout(function(){ el.style.display = 'none'; }, 4000);
}

function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'});
}

(function load() {
    var token = localStorage.getItem('authToken');
    if (!token) { location.href = '/'; return; }
    fetch('/oneapichat/api/auth.php?action=get_profile&token=' + encodeURIComponent(token))
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (!d.success) { location.href = '/'; return; }
            var name = d.username || '?';
            document.getElementById('avatarLetter').textContent = name.charAt(0).toUpperCase();
            document.getElementById('profileUsername').textContent = name;
            document.getElementById('profileRole').textContent = d.role === 'root' ? '管理员' : '用户';
            document.getElementById('profileInfo').innerHTML =
                '<div class="info-row"><span class="label">用户 ID</span><span style="font-size:11px;opacity:0.7">' + (d.user_id||'—') + '</span></div>' +
                '<div class="info-row"><span class="label">注册时间</span><span>' + formatDate(d.created_at) + '</span></div>' +
                '<div class="info-row"><span class="label">最近活跃</span><span>' + formatDate(d.last_active) + '</span></div>';
            // 显示已绑定邮箱
            if (d.email) {
                document.getElementById('boundEmail').textContent = d.email;
                document.getElementById('emailUnbound').style.display = 'none';
                document.getElementById('emailBound').style.display = 'block';
            }
            // 预填用户名
            document.getElementById('newUsername').value = name;
        }).catch(function(){ location.href = '/'; });
})();

function changePassword() {
    var token = localStorage.getItem('authToken');
    var cur = document.getElementById('currentPwd').value;
    var pwd = document.getElementById('newPwd').value;
    var pwd2 = document.getElementById('newPwd2').value;
    var btn = document.getElementById('pwdBtn');
    if (!cur||!pwd||!pwd2){ $msg('pwdMsg','请填写完整',true); return; }
    if (pwd.length<6){ $msg('pwdMsg','新密码至少6位',true); return; }
    if (pwd !== pwd2){ $msg('pwdMsg','两次密码不一致',true); return; }
    btn.disabled=true;
    btn.innerHTML='<span class="spinner" style="display:inline-flex"></span> 更新中...';
    fetch('/oneapichat/api/auth.php?action=update_profile',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:token,current_password:cur,new_password:pwd})
    }).then(function(r){return r.json()}).then(function(d){
        btn.disabled=false;btn.innerHTML='更新密码';
        if(d.success){
            $msg('pwdMsg','密码已更新，即将重新登录...',false);
            setTimeout(function(){ logout(); }, 1500);
        }
        else $msg('pwdMsg',d.error||'更新失败',true);
    }).catch(function(){btn.disabled=false;btn.innerHTML='更新密码';$msg('pwdMsg','网络错误',true)});
}

function changeUsername() {
    var token = localStorage.getItem('authToken');
    var name = document.getElementById('newUsername').value.trim();
    var btn = document.getElementById('nameBtn');
    if (name.length<2){ $msg('nameMsg','用户名至少2个字符',true); return; }
    btn.disabled=true;btn.innerHTML='<span class="spinner" style="display:inline-flex"></span> 更新中...';
    fetch('/oneapichat/api/auth.php?action=update_profile',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:token,username:name})
    }).then(function(r){return r.json()}).then(function(d){
        btn.disabled=false;btn.innerHTML='更新用户名';
        if(d.success){
            $msg('nameMsg',d.message||'用户名已更新',false);
            localStorage.setItem('authUsername', name);
            document.getElementById('profileUsername').textContent = name;
            document.getElementById('avatarLetter').textContent = name.charAt(0).toUpperCase();
        } else $msg('nameMsg',d.error||'更新失败',true);
    }).catch(function(){btn.disabled=false;btn.innerHTML='更新用户名';$msg('nameMsg','网络错误',true)});
}

function sendVerifyCode() {
    var token = localStorage.getItem('authToken');
    var email = document.getElementById('bindEmail').value.trim();
    var btn = document.getElementById('sendCodeBtn');
    if (!email){ $msg('emailMsg','请输入邮箱',true); return; }
    if (sendVerifyCD > 0) return;
    btn.disabled=true;
    sendVerifyCD = 60;
    btn.textContent = sendVerifyCD + 's';
    var timer = setInterval(function(){
        sendVerifyCD--;
        btn.textContent = sendVerifyCD + 's';
        if (sendVerifyCD <= 0){ clearInterval(timer); btn.textContent='重新发送'; btn.disabled=false; }
    }, 1000);
    fetch('/oneapichat/api/auth.php?action=send_verify_code',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:token,email:email})
    }).then(function(r){return r.json()}).then(function(d){
        if (!d.success) {
            clearInterval(timer); sendVerifyCD=0; btn.textContent='发送验证码'; btn.disabled=false;
            $msg('emailMsg',d.error||'发送失败',true);
        }
    }).catch(function(e){
        clearInterval(timer); sendVerifyCD=0; btn.textContent='发送验证码'; btn.disabled=false;
        $msg('emailMsg','网络错误: '+e.message,true);
    });
}
var sendVerifyCD = 0;

function bindEmail() {
    var token = localStorage.getItem('authToken');
    var code = document.getElementById('verifyCode').value.trim();
    var btn = document.getElementById('bindBtn');
    if (code.length!==6){ $msg('emailMsg','请输入6位验证码',true); return; }
    btn.disabled=true;btn.textContent='验证中...';
    fetch('/oneapichat/api/auth.php?action=bind_email',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:token,code:code})
    }).then(function(r){return r.json()}).then(function(d){
        btn.disabled=false;btn.textContent='验证并绑定';
        if(d.success){
            $msg('emailMsg',d.message||'邮箱绑定成功',false);
            document.getElementById('boundEmail').textContent = d.email;
            document.getElementById('emailUnbound').style.display = 'none';
            document.getElementById('emailBound').style.display = 'block';
            document.getElementById('verifyCode').value='';
        } else $msg('emailMsg',d.error||'绑定失败',true);
    }).catch(function(){btn.disabled=false;btn.textContent='验证并绑定';$msg('emailMsg','网络错误',true)});
}

function unbindEmail() {
    if (!confirm('确定解除邮箱绑定？')) return;
    var token = localStorage.getItem('authToken');
    fetch('/oneapichat/api/auth.php?action=unbind_email', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token })
    }).then(function(r){ return r.json(); }).then(function(d){
        if (d.success) {
            $msg('emailMsg', '邮箱已解绑', false);
            document.getElementById('emailBound').style.display = 'none';
            document.getElementById('emailUnbound').style.display = 'block';
            document.getElementById('bindEmail').value = '';
            document.getElementById('verifyCode').value = '';
        } else $msg('emailMsg', d.error || '解绑失败', true);
    }).catch(function(){ $msg('emailMsg', '网络错误', true); });
}

function deleteAccount() {
    if (!confirm('⚠️ 确定要注销账号吗？\n\n此操作不可撤销！\n所有数据将被永久删除。\n\n请再次确认。')) return;
    if (!confirm('最后确认：真的要注销账号吗？')) return;
    var token = localStorage.getItem('authToken');
    fetch('/oneapichat/api/auth.php?action=delete_account', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token })
    }).then(function(r){ return r.json(); }).then(function(d){
        if (d.success) {
            localStorage.clear();
            location.href = '/';
        } else alert(d.error || '注销失败');
    }).catch(function(){ alert('网络错误'); });
}

function logout() {
    localStorage.removeItem('authToken');localStorage.removeItem('authUsername');
    localStorage.removeItem('authUserId');localStorage.removeItem('_cloudLoginToken');
    location.href='/';
}
</script>
</body>
</html>
