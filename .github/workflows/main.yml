name: 刷课

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Start:
    runs-on: ubuntu-latest
    steps:
      - name: 拷贝代码
        uses: actions/checkout@v4

      - name: 设置python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖包
        run: |
          pip install -r ./requirements.txt

      - name: 生成配置文件
        run: |
          cat > config.ini << 'EOF'
[common]
username = ${{ secrets.CHAOXING_USERNAME }}
password = ${{ secrets.CHAOXING_PASSWORD }}
course_list = ${{ secrets.CHAOXING_COURSE_ID }}
speed = 2
auto_next = true
brush_mode = all
chapter_order = sequential

[tiku]
provider = TikuYanxi,TikuAI
submit = true
tokens = ${{ secrets.CHAOXING_TIKU_TOKEN }}
true_list = 正确,对,√,是
false_list = 错误,错,×,否,不对,不正确
ai_base_url = https://oneapi.naujtrats.xyz/v1
ai_model = deepseek-v4-flash
EOF

      - name: Run main.py
        run: |
          python main.py -c config.ini