name: 刷课

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Start:
    runs-on: ubuntu-latest
    steps:
      - name: 拷贝代码
        uses: actions/checkout@v4

      - name: 设置python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖包
        run: |
          pip install -r ./requirements.txt

      - name: Run main.py
        env:
          CHAOXING_USERNAME: ${{ secrets.CHAOXING_USERNAME }}
          CHAOXING_PASSWORD: ${{ secrets.CHAOXING_PASSWORD }}
          CHAOXING_COURSE_ID: ${{ secrets.CHAOXING_COURSE_ID }}
        run: |
          python main.py -u "$CHAOXING_USERNAME" -p "$CHAOXING_PASSWORD" -l "$CHAOXING_COURSE_ID"

