name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.2.3)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create archive
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p release
          # 排除不需要的文件
          tar --exclude='.git' --exclude='.archive_backups' --exclude='__pycache__' \
              --exclude='*.pyc' --exclude='.engine' --exclude='node_modules' \
              --exclude='.claude' -czf "release/oneapichat-${VERSION}.tar.gz" .
          cd release && sha256sum "oneapichat-${VERSION}.tar.gz" > "oneapichat-${VERSION}.tar.gz.sha256"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: OneAPIChat ${{ github.event.inputs.version }}
          body: |
            ## OneAPIChat ${{ github.event.inputs.version }}

            ### 部署要求
            - Ubuntu/Debian + Nginx + PHP 8.3 + Python 3.11+
            - 可选: Chromium (浏览器自动化)、Playwright

            ### 快速部署
            ```bash
            tar xzf oneapichat-${VERSION}.tar.gz -C /var/www/html/oneapichat
            cd /var/www/html/oneapichat/python
            pip install -r requirements.txt
            python engine_server.py &
            ```

            ### 校验
            SHA256: 见 .sha256 文件
          files: release/*
          draft: false
          prerelease: false
