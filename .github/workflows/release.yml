name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.3)'
        required: false
        type: string

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=OneAPIChat
            org.opencontainers.image.description=Multi-Model AI Chat Platform with Agent Support
            org.opencontainers.image.licenses=AGPL-3.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Release Notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          [ -z "$VERSION" ] && VERSION="${{ inputs.version }}"
          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" <<EOF
          ## OneAPIChat $VERSION

          **Multi-Model AI Chat Platform with Agent Support**

          ### 📦 Deployment

          #### Docker (recommended)

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:$VERSION
          docker run -d -p 8080:8080 --name oneapichat \\
            ghcr.io/${{ github.repository }}:$VERSION
          \`\`\`

          Or with docker-compose:

          \`\`\`yaml
          services:
            web:
              image: ghcr.io/${{ github.repository }}:$VERSION
              ports:
                - "8080:8080"
          \`\`\`

          #### One-Click Script

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${VERSION#v}/deploy.sh | sudo bash
          \`\`\`

          ---

          ### 🌟 What's New

          See [CHANGELOG](https://github.com/${{ github.repository }}/blob/$VERSION/CHANGELOG.md)

          ### 📋 System Requirements

          - **Docker:** 20.10+ (recommended)
          - **Native:** Ubuntu 20.04+ / Debian 11+ / CentOS 8+
          - **Windows (native):** see Windows installation below
          - **Dependencies:** PHP 8.0+, Python 3.10+

          ### 🪟 Windows Installation

          #### Option 1: PowerShell (admin, recommended)

          \`\`\`powershell
          irm https://raw.githubusercontent.com/${{ github.repository }}/$VERSION/deploy.ps1 | iex
          \`\`\`

          This automatically installs PHP 8.3 + Python 3.12, starts the engine and web server.

          #### Option 2: Docker Desktop

          \`\`\`bash
          docker run -d -p 8080:8080 ghcr.io/${{ github.repository }}:$VERSION
          \`\`\`

          #### Option 3: Manual download

          Download the Windows ZIP below, extract, and run \`deploy.ps1\` as Administrator.

          ---

          🐛 Issues: https://github.com/${{ github.repository }}/issues
          EOF
          # Strip leading whitespace (8 spaces from YAML indent)
          sed -i 's/^        //' "$NOTES_FILE"
          # Write to GITHUB_OUTPUT
          {
            echo "notes<<DELIM"
            cat "$NOTES_FILE"
            echo "DELIM"
          } >> "$GITHUB_OUTPUT"
          rm -f "$NOTES_FILE"

      - name: Create Windows ZIP
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ZIP_NAME="oneapichat-$VERSION-windows.zip"
          # Create a clean export (exclude .git, .github, .engine, __pycache__)
          git archive --format=zip --output="/tmp/$ZIP_NAME" HEAD
          # Add deploy.ps1 at root (already included via git)
          echo "zip_asset=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "zip_path=/tmp/$ZIP_NAME" >> $GITHUB_OUTPUT
        id: winzip

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          files: |
            /tmp/oneapichat-*.zip

      - name: Upload Docker Image Digest
        run: |
          echo "## Image Info" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ github.repository }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
